name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: facklercloud
    container:
      image: alpine:latest
    steps:
      - name: Install dependencies
        shell: sh
        run: |
          apk add --no-cache \
            git \
            hugo \
            openssh-client \
            fish

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install npm dependencies
        run: npm install

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        shell: fish {0}
        run: ./deploy.fish
